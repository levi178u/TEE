services:
  # The PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: chatbot-postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: chatbotdb
    ports:
      - "51214:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The Python FastAPI Chatbot Server
  backend:
    build: .
    container_name: chatbot-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Use the Docker network service name 'db' and the matching credentials
      - DATABASE_URL=postgresql://myuser:mypassword@db:5432/chatbotdb
      - GROQ_API_KEY=${GROQ_API_KEY}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
    depends_on:
      - db
    volumes:
      - .:/app 
      - faiss_data:/app/faiss_index 

volumes:
  postgres_data:
  faiss_data: